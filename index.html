<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Lism Orbit — sua central de links, projetos e conexões.">
  <meta name="theme-color" content="#03040a">
  <title>Lism Orbit | Your digital universe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="space" aria-hidden="true">
    <div class="stars stars-small"></div>
    <div class="stars stars-medium"></div>
    <div class="nebula nebula-left"></div>
    <div class="nebula nebula-right"></div>
    <div class="planet planet-left"></div>
    <div class="planet planet-right"></div>
    <div class="orbit orbit-one"></div>
    <div class="orbit orbit-two"></div>
    <div class="orbit-light"></div>
  </div>

  <main class="page-shell">
    <section class="orbit-card" aria-labelledby="project-name">
      <div class="card-shine" aria-hidden="true"></div>

      <header class="hero">
        <div class="brand-symbol" aria-hidden="true">
          <span></span>
          <span></span>
        </div>
        <h1 id="project-name">LISM ORBIT</h1>
        <p class="subtitle" id="project-subtitle">Your digital universe.</p>
        <div class="signal-line" aria-hidden="true"><span></span></div>
        <div class="intro">
          <p id="description-line-1">Projetos, conexões e ideias.</p>
          <p id="description-line-2">Tudo conectado em um só lugar.</p>
        </div>
      </header>

      <nav class="links-list" id="links-list" aria-label="Links principais"></nav>

      <nav class="social-links" id="social-links" aria-label="Redes sociais"></nav>

      <footer class="card-footer">
        <p class="footer-phrase" id="footer-phrase">BUILD. LEARN. EVOLVE.</p>
        <div class="signal-line signal-line-footer" aria-hidden="true"><span></span></div>
        <p class="copyright" id="copyright">© 2026 Lism Technologies. Todos os direitos reservados.</p>
      </footer>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite">Link em breve.</div>

  <script src="script.js"></script>
</body>
</html>
